name: backend

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install server deps
        run: pip install -r server/requirements.txt httpx
      - name: Run API tests
        run: python server/test_server.py

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pixel-invaders-arcade:latest
            ghcr.io/${{ github.repository_owner }}/pixel-invaders-arcade:${{ github.sha }}

  # Runs on the Ubuntu box via a self-hosted runner (label: arcade-box).
  # Pulls the image CI just published, restarts the service, then smoke
  # tests the LIVE deployment. If no runner is online, this job simply
  # waits in the queue until one registers.
  deploy:
    needs: build-and-push
    runs-on: [self-hosted, arcade-box]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Redeploy the arcade service
        run: |
          cd ~/arcade
          docker compose pull
          docker compose up -d
      - name: Smoke test the live deployment
        run: python3 server/deploy_smoke.py http://localhost:8000
      - name: Prune old images
        if: success()
        run: docker image prune -f

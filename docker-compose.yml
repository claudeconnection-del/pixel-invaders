# Arcade backend for the Ubuntu box.
#
# With GHCR (after `docker login ghcr.io` with a PAT that has read:packages):
#   docker compose pull && docker compose up -d
# Or build locally instead:
#   docker compose up -d --build
services:
  arcade-api:
    image: ghcr.io/claudeconnection-del/pixel-invaders-arcade:latest
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      # loopback only by default — safe on any machine. The Ubuntu box layers
      # docker-compose.lan.yml on top (see the deploy job) to add its LAN bind;
      # never publish on 0.0.0.0 (sshd stays the box's only wildcard listener).
      - "127.0.0.1:8083:8083"
    volumes:
      - arcade-data:/data
    environment:
      # lock down browser reads to your site(s) if you like:
      # ARCADE_CORS_ORIGINS: "https://chomey.org,https://www.chomey.org"
      ARCADE_CORS_ORIGINS: "*"
      # require a key for score submissions (set the same key in the game
      # via the CABINET_MAN_API_KEY env var; old PIXEL_INVADERS_API_KEY works):
      # ARCADE_API_KEY: "pick-something"
    mem_limit: 256m
    cpus: 0.5
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped

volumes:
  arcade-data:
